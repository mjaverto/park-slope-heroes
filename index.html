<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Park Slope Heroes</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #222;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-text-size-adjust: 100%;
      }
      #game, canvas {
        display: block;
        margin: 0 auto;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
